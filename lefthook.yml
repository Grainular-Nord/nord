# @format

# EXAMPLE USAGE:
#
#   Refer for explanation to following link:
#   https://github.com/evilmartians/lefthook/blob/master/docs/configuration.md
#
pre-commit:
    parallel: false
    commands:
        format:
            run: bun run format {staged_files} --no-errors-on-unmatched
        lint:ts:
            run: bun run lint:ts {staged_files} --no-errors-on-unmatched
        lint:md:
            glob: "*.md"
            run: bun run lint:md {staged_files}
commit-msg:
    commands:
        lint:
            run: bunx commitlint --edit
